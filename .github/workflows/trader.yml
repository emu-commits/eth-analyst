# .github/workflows/trader.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs the ETH trader hourly.
# On every run: generates signals.json, checks positions, executes trades.
# Commits signals.json and positions.json back to the repo after each run.
# Sends an email notification when a trade fires (via GitHub's built-in mailer).
#
# Required GitHub Actions secrets (set in repo Settings → Secrets → Actions):
#   ALCHEMY_RPC_URL     — https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY
#   WALLET_PRIVATE_KEY  — 0x... (only needed when PAPER_TRADING=false)
#
# To go live: add repository variable PAPER_TRADING = false
# (Settings → Secrets and variables → Actions → Variables tab)
# ─────────────────────────────────────────────────────────────────────────────

name: ETH Trader

on:
  schedule:
    # Run at the top of every hour
    - cron: '0 * * * *'
  # Allow manual trigger from Actions tab for testing
  workflow_dispatch:
    inputs:
      paper_override:
        description: 'Force paper trading? (true/false)'
        required: false
        default: 'true'

jobs:
  trade:
    runs-on: ubuntu-latest
    # Give the job permission to commit back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch with token so we can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run trader ─────────────────────────────────────────────────────────
      - name: Run trader
        id: trader
        env:
          ALCHEMY_RPC_URL:    ${{ secrets.ALCHEMY_RPC_URL }}
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          # Use repo variable PAPER_TRADING; workflow_dispatch input overrides it
          PAPER_TRADING: >-
            ${{
              github.event.inputs.paper_override != '' &&
              github.event.inputs.paper_override ||
              vars.PAPER_TRADING || 'true'
            }}
        run: |
          python -m trader.trader 2>&1 | tee run_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ── 4. Capture whether any trades fired ───────────────────────────────────
      - name: Check for trade actions
        id: check_trades
        run: |
          # If trades.log was modified this run, set traded=true
          if git diff --name-only | grep -q "trades.log"; then
            echo "traded=true"  >> $GITHUB_OUTPUT
          else
            echo "traded=false" >> $GITHUB_OUTPUT
          fi

      # ── 5. Commit updated state files back to repo ────────────────────────────
      - name: Commit signals and positions
        run: |
          git config user.name  "ETH Trader Bot"
          git config user.email "trader-bot@users.noreply.github.com"
          git add signals.json positions.json trades.log pool_cache.json || true
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m \
            "chore: trader run $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
          git push

      # ── 6. Email notification when a trade fires ─────────────────────────────
      - name: Prepare email body
        if: steps.check_trades.outputs.traded == 'true'
        run: |
          # Prepend a header with the run URL to the output file
          HEADER="ETH Trader — trade executed\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n"
          echo -e "$HEADER$(cat run_output.txt)" > email_body.txt
          # Swap the file used for email
          mv email_body.txt run_output.txt

      - name: Notify on trade
        if: steps.check_trades.outputs.traded == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.NOTIFY_EMAIL_FROM }}
          password:       ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to:             ${{ secrets.NOTIFY_EMAIL_TO }}
          from:           ETH Trader <${{ secrets.NOTIFY_EMAIL_FROM }}>
          subject:        '[ETH Trader] Trade executed — ${{ github.run_number }}'
          body_path: run_output.txt

      # ── 7. Always upload run output as artifact (30 day retention) ────────────
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trader-run-${{ github.run_number }}
          path: run_output.txt
          retention-days: 30
